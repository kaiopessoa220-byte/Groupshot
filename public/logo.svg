<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 178 46" fill="none">
  <defs>
    <linearGradient id="g" x1="2" y1="46" x2="56" y2="4" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
  </defs>

  <!-- Bullet icon: centered at (34,19), tilted -38deg -->
  <g transform="translate(34,19) rotate(-38)">

    <!-- Speed lines (3 parallel, behind the bullet) -->
    <line x1="-37" y1="-6.5" x2="-24" y2="-6.5" stroke="url(#g)" stroke-width="2.3" stroke-linecap="round"/>
    <line x1="-33" y1="0"    x2="-24" y2="0"    stroke="url(#g)" stroke-width="2.3" stroke-linecap="round"/>
    <line x1="-37" y1="6.5"  x2="-24" y2="6.5"  stroke="url(#g)" stroke-width="2.3" stroke-linecap="round"/>

    <!-- Outer bullet shell (rounded rect + pointed nose) -->
    <path d="M -21,-12
             L  9,-12
             Q  24,-12  24,0
             Q  24,12   9,12
             L -21,12
             Q -24,12  -24,0
             Q -24,-12 -21,-12
             Z"
          stroke="url(#g)" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- Inner hollow compartment -->
    <path d="M -17,-7
             L  6,-7
             Q  16,-7  16,0
             Q  16,7   6,7
             L -17,7
             Q -19,7  -19,0
             Q -19,-7 -17,-7
             Z"
          stroke="url(#g)" stroke-width="2" stroke-linejoin="round"/>
  </g>

  <!-- "group" in currentColor (white dark / dark light mode), "shot" in green -->
  <text
    x="62" y="31"
    font-family="'Inter','Arial Black','Helvetica Neue',Arial,sans-serif"
    font-weight="900"
    font-size="21"
    letter-spacing="-0.5"
  >
    <tspan fill="currentColor">group</tspan><tspan fill="url(#g)">shot</tspan>
  </text>
</svg>
